stages:
  - lint
  - test
  - build
  - release

default:
  tags:
    - cc_starter

variables:
  CARGO_TERM_COLOR: always
  RUST_IMAGE: rust:1.94

# =============================================================================
# CI
# =============================================================================

lint:
  stage: lint
  image: ${RUST_IMAGE}
  before_script:
    - rustup component add clippy rustfmt
  script:
    - cargo fmt --check
    - cargo clippy -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: test
  image: ${RUST_IMAGE}
  script:
    - cargo test --verbose
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# =============================================================================
# Release — multi-platform musl static builds, triggered by v* tags
# =============================================================================

.linux-musl-build:
  stage: build
  image: ${RUST_IMAGE}
  before_script:
    - apt-get update && apt-get install -y musl-tools curl
  after_script:
    - |
      for f in dist/*.tar.gz; do
        echo "Uploading $f to generic package registry..."
        curl -sS --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$f" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/cct/${CI_COMMIT_TAG}/$(basename $f)"
      done
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build-x86_64-linux-musl:
  extends: .linux-musl-build
  variables:
    TARGET: x86_64-unknown-linux-musl
  script:
    - rustup target add ${TARGET}
    - cargo build --release --target ${TARGET}
    - mkdir -p dist
    - tar czf dist/cct-${TARGET}.tar.gz -C target/${TARGET}/release cct
  artifacts:
    paths:
      - dist/

build-aarch64-linux-musl:
  extends: .linux-musl-build
  variables:
    TARGET: aarch64-unknown-linux-musl
  before_script:
    - apt-get update && apt-get install -y musl-tools curl xz-utils
    - curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar xJ -C /usr/local --strip-components=1
    - ln -sf /usr/local/zig /usr/local/bin/zig
    - rustup target add ${TARGET}
  script:
    - cargo install cargo-zigbuild
    - cargo zigbuild --release --target ${TARGET}
    - mkdir -p dist
    - tar czf dist/cct-${TARGET}.tar.gz -C target/${TARGET}/release cct
  artifacts:
    paths:
      - dist/

release:
  stage: release
  image: ${RUST_IMAGE}
  needs:
    - build-x86_64-linux-musl
    - build-aarch64-linux-musl
  script:
    - |
      echo "Creating release ${CI_COMMIT_TAG}"
      curl -sS --fail \
           --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --header "Content-Type: application/json" \
           --data @- \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" <<JSON
      {
        "tag_name": "${CI_COMMIT_TAG}",
        "name": "cct ${CI_COMMIT_TAG}",
        "description": "## cct ${CI_COMMIT_TAG}\n\nStatic musl-linked binaries — no glibc dependency.\n\n| Target | Download |\n|--------|----------|\n| x86_64-unknown-linux-musl | [cct-x86_64-unknown-linux-musl.tar.gz](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/cct/${CI_COMMIT_TAG}/cct-x86_64-unknown-linux-musl.tar.gz) |\n| aarch64-unknown-linux-musl | [cct-aarch64-unknown-linux-musl.tar.gz](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/cct/${CI_COMMIT_TAG}/cct-aarch64-unknown-linux-musl.tar.gz) |"
      }
      JSON
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
